<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script defer src="script/script.js"></script>
    <title>Exo 06 - Cards Mini-came </title>
</head>
<body>
    <div class="wrapper">
        <h1>Cards mini-game</h1>
        <div class="table">
            <div class="text_zone">
                <p class="status"></p>
                <button class="btn">Start</button>
            </div>
        </div>
        

        <div class="bet_zone">
            <p class="score"></p>
            <p class="bet"></p>
            <p class="round"></p>
            <button class="btn_plus">Bet ++</button>
            <button class="btn_minus">Bet --</button>
        </div>
        

    </div>    

</body>
</html>
